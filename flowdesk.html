<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ===================================================================
       TOKENS - light theme
    =================================================================== */
    :root {
      --bg:        #f5f6f8;
      --surface:   #ffffff;
      --surface2:  #f0f1f4;
      --surface3:  #e8eaed;
      --border:    #e0e0e0;
      --border2:   #caccd1;
      --text:      #333333;
      --heading:   #1a1a2e;
      --dim:       #6b7280;
      --dim2:      #9ca3af;
      --green:     #16a34a;
      --green2:    #15803d;
      --red:       #dc2626;
      --red2:      #b91c1c;
      --amber:     #d97706;
      --blue:      #3b82f6;
      --cyan:      #0891b2;
      --gold:      #b45309;
      --purple:    #7c3aed;
      --radius:    6px;
      --sans:      "IBM Plex Sans", system-ui, sans-serif;
      --mono:      "SF Mono", Menlo, "JetBrains Mono", "Fira Code", Consolas, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ===================================================================
       HEADER
    =================================================================== */
    #header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      position: sticky; top: 0; z-index: 200;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    #header h1 {
      font-size: 18px; font-weight: 800;
      color: var(--blue); letter-spacing: .04em;
    }
    .status-dot {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; color: var(--dim);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-green  { background: var(--green); box-shadow: 0 0 5px rgba(22,163,74,.5); }
    .dot-red    { background: var(--red); }
    .dot-amber  { background: var(--amber); }
    .dot-blue   { background: var(--blue); }
    #market-status {
      font-size: 12px; padding: 2px 8px;
      border-radius: 4px; font-weight: 700; letter-spacing: .05em;
    }
    .ms-open   { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .ms-pre    { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
    .ms-after  { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .ms-closed { background: #f3f4f6; color: var(--dim); border: 1px solid var(--border2); }
    #server-time { font-size: 12px; color: var(--dim); margin-left: auto; }

    /* ===================================================================
       TICKER INPUT
    =================================================================== */
    #ticker-bar {
      display: flex; gap: 8px; align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    #ticker-bar label { font-size: 13px; color: var(--dim); font-weight: 600; }
    #ticker-input {
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--heading); font-family: var(--sans); font-size: 14px;
      padding: 5px 10px; border-radius: var(--radius);
      width: 340px; outline: none;
    }
    #ticker-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .btn {
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--heading); font-family: var(--sans); font-size: 13px; font-weight: 600;
      padding: 5px 14px; border-radius: var(--radius); cursor: pointer;
    }
    .btn:hover { border-color: var(--blue); color: var(--blue); background: #eff6ff; }

    /* ===================================================================
       ALERTS BAR
    =================================================================== */
    #alerts-bar {
      display: none;
      padding: 6px 16px;
      background: #fef2f2;
      border-bottom: 1px solid #fca5a5;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    #alerts-bar.active { display: flex; }
    .alert-chip {
      font-size: 13px; font-weight: 700; padding: 2px 10px;
      border-radius: 4px; letter-spacing: .03em;
    }
    .chip-triple  { background: #fef9c3; color: #92400e; border: 1px solid #fcd34d; }
    .chip-conf    { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .chip-exhaust { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; animation: pulse 1.2s infinite; }
    .chip-ice     { background: #e0f2fe; color: #0369a1; border: 1px solid #7dd3fc; }
    .chip-bear    { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
    .chip-vol     { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }

    /* ===================================================================
       WATCHLIST — vertical stacked rows
    =================================================================== */
    #watchlist {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 16px;
    }

    /* ===================================================================
       TICKER CARD
    =================================================================== */
    .ticker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
      transition: border-color .2s, box-shadow .2s;
    }
    .ticker-card.has-confluence {
      border-color: #fcd34d;
      box-shadow: 0 0 8px rgba(180,83,9,.10);
    }
    .ticker-card.has-triple {
      border-color: #f59e0b;
      box-shadow: 0 0 14px rgba(180,83,9,.18);
      animation: card-pulse 1.5s infinite;
    }

    /* ===== Compact header bar (always visible, 48px) ===== */
    .card-header-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 0 12px; height: 48px;
      cursor: pointer; user-select: none;
      transition: background .15s;
    }
    .card-header-bar:hover { background: #f8f9fb; }
    .ticker-card.is-open > .card-header-bar {
      background: #eff6ff;
      border-left: 3px solid var(--blue);
      padding-left: 9px; /* compensate for border */
    }
    .ticker-card.has-triple > .card-header-bar { background: #fffbeb; }
    .ticker-card.has-confluence > .card-header-bar { background: #fffdf0; }

    /* Chevron rotates when open */
    .card-chevron {
      font-size: 9px; color: var(--dim2);
      flex-shrink: 0; width: 12px; text-align: center;
      transition: transform .2s;
    }
    .ticker-card.is-open .card-chevron { transform: rotate(90deg); }

    /* Ticker symbol */
    .hbar-ticker { font-size: 15px; font-weight: 800; color: var(--heading); min-width: 50px; }

    /* Price + change */
    .hbar-price  { font-size: 14px; font-weight: 700; }
    .hbar-change { font-size: 12px; font-weight: 600; }

    /* Vertical separator */
    .hbar-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; margin: 0 2px; }

    /* VWAP */
    .hbar-lbl  { font-size: 11px; color: var(--dim); white-space: nowrap; }
    .hbar-val  { font-size: 12px; font-weight: 600; color: var(--heading); }
    .hbar-ext  { font-size: 11px; font-weight: 700; }

    /* Vol */
    .hbar-vol  { font-size: 12px; color: var(--dim); white-space: nowrap; }
    .hbar-vol span { font-weight: 600; color: var(--heading); }

    /* Bid / Ask */
    .hbar-ba   { font-size: 11px; color: var(--dim); white-space: nowrap; }

    /* Right-side badges + controls */
    .hbar-right { display: flex; align-items: center; gap: 5px; margin-left: auto; }

    /* Bookmap online dot */
    .hbar-bm-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* Remove button */
    .card-remove {
      background: none; border: none; color: var(--dim2);
      font-size: 13px; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0;
    }
    .card-remove:hover { color: var(--red); }

    /* Status badge (reused for market session) */
    .card-status-badge {
      font-size: 10px; font-weight: 700; padding: 1px 6px;
      border-radius: 3px; letter-spacing: .05em;
    }

    /* ===== Collapsible body ===== */
    .card-body-wrap {
      display: none;
      border-top: 1px solid var(--border);
    }
    .ticker-card.is-open > .card-body-wrap { display: block; }

    /* Keep legacy .card-ticker for any remaining references */
    .card-ticker { font-size: 15px; font-weight: 800; color: var(--heading); }

    /* ===== Price Panel ===== */
    .price-panel {
      padding: 8px 12px 6px;
      border-bottom: 1px solid var(--border);
    }
    .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
    .price-big { font-size: 20px; font-weight: 800; color: var(--heading); }
    .price-change { font-size: 14px; font-weight: 700; }
    .price-bid-ask { font-size: 13px; color: var(--dim); }
    .up   { color: var(--green); }
    .down { color: var(--red); }

    /* ===== VWAP Row ===== */
    .vwap-row {
      display: flex; align-items: center; gap: 10px;
      padding: 5px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .vwap-label { color: var(--dim); font-weight: 600; }
    .vwap-val   { color: var(--heading); font-weight: 600; }
    .vwap-ext   { font-weight: 700; }
    .vwap-ext-bear { color: var(--red); }
    .vwap-ext-bull { color: var(--green); }
    .vwap-ext-ok   { color: var(--dim); }
    .div-badge {
      margin-left: auto; font-size: 12px; font-weight: 700;
      padding: 1px 7px; border-radius: 3px;
    }

    /* ===== Stats Grid ===== */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 3px 8px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .stat-row { display: flex; justify-content: space-between; }
    .stat-label { color: var(--dim); }
    .stat-val   { color: var(--heading); font-weight: 600; }

    /* ===== RelVol Section ===== */
    .relvol-section {
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
    }
    .relvol-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .relvol-num    { font-size: 18px; font-weight: 800; }
    .rv-gray   { color: var(--dim2); }
    .rv-white  { color: var(--heading); }
    .rv-yellow { color: #ca8a04; }
    .rv-orange { color: var(--amber); }
    .rv-red    { color: var(--red); animation: pulse 1s infinite; }
    .relvol-meta { font-size: 12px; color: var(--dim); display: flex; gap: 12px; flex-wrap: wrap; }
    .rv-sparkline { margin-top: 5px; }

    /* ===== Order Book Summary ===== */
    .book-summary {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
    }
    .book-side-label {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 3px;
    }
    .book-bids .book-side-label { color: var(--green); }
    .book-asks .book-side-label { color: var(--red); }
    .book-level {
      display: flex; justify-content: space-between;
      font-size: 12px; padding: 2px 0;
      border-bottom: 1px solid var(--surface3);
    }
    .bl-price { color: var(--heading); }
    .bl-size  { color: var(--dim); }
    .bl-cob   { color: var(--dim2); }
    .book-level.wall { background: rgba(59,130,246,.04); }
    .book-level.wall .bl-price { font-weight: 700; }

    /* ===== Bookmap Signals ===== */
    .signals-section { padding: 7px 12px; border-bottom: 1px solid var(--border); }
    .signals-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--cyan); margin-bottom: 5px;
    }
    .iceberg-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; padding: 2px 0; cursor: default;
    }
    .ice-bid  { color: var(--green); }
    .ice-ask  { color: var(--red); }
    .ice-conf { font-size: 12px; color: var(--dim); }
    .ice-impl { font-size: 12px; font-weight: 700; }

    /* ===== Signal Badges ===== */
    .badge-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .badge {
      font-size: 13px; font-weight: 700; padding: 2px 8px;
      border-radius: 3px; letter-spacing: .02em;
    }
    .badge-red    { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
    .badge-green  { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .badge-amber  { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .badge-blue   { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
    .badge-cyan   { background: #e0f2fe; color: #0369a1; border: 1px solid #7dd3fc; }
    .badge-gold   { background: #fef9c3; color: #92400e; border: 1px solid #fde68a; }
    .badge-flash  { animation: flash .7s infinite; }

    /* ===== TRIPLE CONFLUENCE ===== */
    .triple-section {
      padding: 8px 12px;
      background: #fffbeb;
      border-bottom: 1px solid #fcd34d;
    }
    .triple-title {
      font-size: 13px; font-weight: 800; color: #92400e;
      letter-spacing: .05em; margin-bottom: 5px;
    }
    .triple-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 6px; font-size: 13px;
    }
    .triple-stat { display: flex; flex-direction: column; gap: 1px; }
    .triple-stat-label { color: var(--dim); font-size: 12px; }
    .triple-stat-val   { font-weight: 700; }

    /* ===== Card Footer ===== */
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px;
      background: var(--surface2);
    }
    .ts-footer { font-size: 12px; color: var(--dim2); }
    .bm-offline { font-size: 12px; color: var(--dim2); font-style: italic; }
    .copy-btn {
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--dim); font-family: var(--sans); font-size: 12px; font-weight: 600;
      padding: 2px 10px; border-radius: 3px; cursor: pointer;
    }
    .copy-btn:hover { border-color: var(--blue); color: var(--blue); background: #eff6ff; }

    /* ===================================================================
       ANIMATIONS
    =================================================================== */
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes flash   { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes card-pulse {
      0%,100%{box-shadow:0 0 12px rgba(180,83,9,.15)}
      50%    {box-shadow:0 0 28px rgba(180,83,9,.35)}
    }
    @keyframes fadeIn  { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
    .new-signal { animation: fadeIn .4s ease; }
    @keyframes ca-spin  { to { transform: rotate(360deg); } }

    /* ===================================================================
       CATALYST PANEL
    =================================================================== */
    .catalyst-panel { border-top: 1px solid var(--border); }

    /* Button — sits beside Copy in the footer */
    .catalyst-btn {
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--dim); font-family: var(--sans); font-size: 12px; font-weight: 600;
      padding: 2px 10px; border-radius: 3px; cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
    }
    .catalyst-btn:hover,
    .catalyst-btn.active { border-color: var(--blue); color: var(--blue); background: #eff6ff; }

    /* Loading */
    .ca-loading {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; font-size: 13px; color: var(--dim);
    }
    .ca-spinner {
      width: 15px; height: 15px; flex-shrink: 0;
      border: 2px solid var(--border2); border-top-color: var(--blue);
      border-radius: 50%; animation: ca-spin .7s linear infinite;
    }

    /* Error */
    .ca-error {
      padding: 10px 14px; font-size: 12px; color: var(--red);
      background: #fef2f2; display: flex; align-items: center; gap: 8px;
    }
    .ca-retry-btn {
      background: none; border: 1px solid #fca5a5; color: var(--red);
      font-size: 11px; padding: 1px 8px; border-radius: 3px; cursor: pointer;
    }

    /* API key prompt */
    .ca-key-prompt {
      padding: 10px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      background: #fafafa;
    }
    .ca-key-label { font-size: 12px; color: var(--dim); font-weight: 600; white-space: nowrap; }
    .ca-key-input {
      flex: 1; min-width: 180px; height: 28px;
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--heading); font-family: var(--sans); font-size: 12px;
      padding: 2px 8px; border-radius: var(--radius); outline: none;
    }
    .ca-key-input:focus { border-color: var(--blue); }
    .ca-key-save {
      height: 28px; padding: 0 12px; border: none; border-radius: var(--radius);
      background: var(--blue); color: #fff;
      font-family: var(--sans); font-size: 12px; font-weight: 700; cursor: pointer;
    }

    /* Result body */
    .ca-body { padding: 10px 12px; }
    .ca-header-row {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
    }

    /* Verdict + strength badges */
    .ca-verdict, .ca-strength {
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 999px; letter-spacing: .04em;
    }
    .ca-v-short  { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
    .ca-v-avoid  { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
    .ca-v-watch  { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .ca-s-strong { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .ca-s-weak   { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
    .ca-s-mixed  { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .ca-s-unknown{ background: #f3f4f6; color: var(--dim); border: 1px solid var(--border2); }

    /* Catalyst description */
    .ca-line { font-size: 13px; color: var(--heading); line-height: 1.5; margin-bottom: 8px; }

    /* Score / squeeze bars */
    .ca-bar-row {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px;
    }
    .ca-bar-label { font-size: 12px; color: var(--dim); font-weight: 600; }
    .ca-bar-val   { font-size: 13px; font-weight: 800; }
    .ca-bar-track {
      height: 5px; background: var(--surface3); border-radius: 999px;
      overflow: hidden; margin-bottom: 8px;
    }
    .ca-bar-fill  { height: 100%; border-radius: 999px; }

    /* Stat pills */
    .ca-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .ca-pill {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: var(--surface3); color: var(--dim); border: 1px solid var(--border);
    }
    .ca-pill span { color: var(--heading); font-weight: 600; }

    /* Reasoning box */
    .ca-reasoning {
      font-size: 12px; color: var(--dim); line-height: 1.5;
      padding: 8px 10px; background: var(--surface2);
      border-radius: 4px; border-left: 2px solid var(--border2);
    }

    /* ===================================================================
       NEWS PANEL
    =================================================================== */
    .news-panel {
      border-top: 1px solid var(--border);
    }
    .news-panel-header {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--dim);
    }
    .news-count-badge {
      font-size: 10px; font-weight: 700; padding: 1px 6px;
      border-radius: 999px; background: #dbeafe; color: #1d4ed8;
      border: 1px solid #93c5fd;
    }
    .news-count-badge.has-recent { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .news-item {
      display: flex; flex-direction: column; gap: 3px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item:hover { background: #f8f9fb; }
    .news-item-top { display: flex; align-items: flex-start; gap: 6px; }
    .news-headline {
      font-size: 13px; color: var(--heading); line-height: 1.4;
      text-decoration: none; font-weight: 500; flex: 1;
    }
    .news-headline:hover { color: var(--blue); text-decoration: underline; }
    .news-breaking {
      font-size: 10px; font-weight: 800; padding: 1px 6px;
      border-radius: 3px; background: #fef3c7; color: #92400e;
      border: 1px solid #fcd34d; white-space: nowrap; flex-shrink: 0;
      animation: pulse 1.5s infinite;
    }
    .news-meta {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .news-source { font-size: 11px; color: var(--dim); font-weight: 600; }
    .news-time   { font-size: 11px; color: var(--dim2); }
    .news-sentiment {
      font-size: 10px; font-weight: 700; padding: 1px 6px;
      border-radius: 999px; letter-spacing: .03em;
    }
    .ns-bullish { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }

<script>
// ============================================================================
// CONFIGURATION
// ============================================================================
const TAILSCALE_IP      = "127.0.0.1"; // use 100.75.239.12 when accessing via Tailscale
const BOOKMAP_ENABLED   = false;   // set true when bridge is configured
const BOOKMAP_PORT      = 8766;
const BOOKMAP_URL       = `http://${TAILSCALE_IP}:${BOOKMAP_PORT}`;

const ALPACA_BASE       = "https://data.alpaca.markets";
const ALPACA_KEY_ID     = "PKMI7JDDSN2SITPW2AXY7ZZZBT";
const ALPACA_SECRET_KEY = "F3aHYKWdHsjDBxbqFvKYBhFjuuMWmeaKVkWd4SjRH3xt";

const ALPACA_REFRESH_MS  = 15000;
const BOOKMAP_REFRESH_MS = 15000;

// Default watchlist " edit to match your Bookmap instruments
let WATCHLIST = ["AAPL"];

// Intraday RelVol time-of-day weights
const TOD_WEIGHTS = [
  { start: [9,30],  end: [10,0],  w: 0.6 },
  { start: [10,0],  end: [11,0],  w: 0.8 },
  { start: [11,0],  end: [14,0],  w: 1.0 },
  { start: [14,0],  end: [15,30], w: 0.9 },
  { start: [15,30], end: [16,0],  w: 0.7 },
];
// ============================================================================

// ---------------------------------------------------------------------------
// RelVolDetector
// ---------------------------------------------------------------------------
class RelVolDetector {
  constructor(ticker) {
    this.ticker = ticker;
    this.avgDailyVol   = null;     // fetched once on init
    this.rvCurrent     = null;
    this.rvPeak        = 0;
    this.volPace       = null;     // projected EOD volume
    this.avgTradeSize  = null;
    this.acceleration  = 0;        // % change last 15s
    this.signal        = null;     // current RelVol signal
    this.signalConf    = 0;
    this._volBuckets   = [];       // [{t, vol}] 15-second buckets
    this._lastBucket   = 0;
    this._lastVol      = 0;
    this._prevBucketVol= 0;
    this._sparkPoints  = new Array(60).fill(0);  // 60-point, 10s buckets
    this._sparkBucket  = 0;
    this._sparkLast    = 0;
  }

  // Fetch 20-day avg volume from Alpaca historical bars (called once)
  async fetchAvgVol() {
    if (this.avgDailyVol !== null) return;
    try {
      const url = `${ALPACA_BASE}/v2/stocks/${this.ticker}/bars?timeframe=1Day&limit=30&feed=sip`;
      const r = await fetch(url, {
        headers: {
          "APCA-API-KEY-ID":     ALPACA_KEY_ID,
          "APCA-API-SECRET-KEY": ALPACA_SECRET_KEY,
        },
        signal: AbortSignal.timeout(5000),
      });
      if (!r.ok) return;
      const d = await r.json();
      const bars = d.bars || [];
      if (bars.length > 0) {
        this.avgDailyVol = bars.reduce((s, b) => s + b.v, 0) / bars.length;
      }
    } catch (_) { /* graceful " leave avgDailyVol null */ }
  }

  // Update with fresh Alpaca bar data
  update(volume, open, close, tradeCount) {
    if (!volume) return;
    const now    = Date.now();
    const etNow  = _etTime();
    const market = _marketMinutesElapsed(etNow);
    if (market <= 0) return;

    // EOD volume pace
    this.volPace = Math.round(volume / market * 390);

    // Time-of-day adjusted RelVol
    const todW = _todWeight(etNow);
    if (this.avgDailyVol && this.avgDailyVol > 0) {
      const rawRV = volume / this.avgDailyVol;
      this.rvCurrent = rawRV / todW;
      if (this.rvCurrent > this.rvPeak) this.rvPeak = this.rvCurrent;
    }

    // 15-second acceleration bucket
    const bucket = Math.floor(now / 15000);
    if (bucket !== this._lastBucket) {
      const bucketVol = volume - this._lastVol;
      if (this._prevBucketVol > 0)
        this.acceleration = (bucketVol - this._prevBucketVol) / this._prevBucketVol * 100;
      this._prevBucketVol = bucketVol;
      this._lastBucket    = bucket;
    }
    this._lastVol = volume;

    // Spark 10-second buckets
    const sparkBucket = Math.floor(now / 10000);
    if (sparkBucket !== this._sparkBucket) {
      this._sparkPoints.push(volume - this._sparkLast);
      if (this._sparkPoints.length > 60) this._sparkPoints.shift();
      this._sparkLast  = volume;
      this._sparkBucket = sparkBucket;
    }

    // Avg trade size
    if (tradeCount && tradeCount > 0) this.avgTradeSize = Math.round(volume / tradeCount);

    this._computeSignal(volume);
  }

  _computeSignal(volume) {
    const rv = this.rvCurrent;
    if (rv == null) return;
    let sig = null; let conf = 0;

    if (rv >= 10) {
      sig = "VOLUME_EXPLOSION"; conf = 0.90;
    } else if (rv >= 5) {
      sig = "VOLUME_SPIKE"; conf = 0.70;
    } else if (rv >= 3) {
      sig = "VOLUME_SURGE"; conf = 0.50;
    }

    // Acceleration bonus
    if (this.acceleration >= 100) conf += 0.20;
    else if (this.acceleration >= 50) conf += 0.10;

    // Avg trade size institutional bonus
    if (this.avgTradeSize && this.avgTradeSize >= 500) conf += 0.15;

    // Volume climax: was >5x, now dropping >30%
    if (this.rvPeak >= 5 && rv < this.rvPeak * 0.70) {
      sig = "VOLUME_CLIMAX"; conf = Math.min(1, conf + 0.10);
    }

    // Dry-up after surge
    if (this.rvPeak >= 5 && rv < 0.5) {
      sig = "VOLUME_DRY_UP"; conf = 0.65;
    }

    this.signal     = sig;
    this.signalConf = Math.min(1, conf);
  }

  buildSparkline() {
    if (!this._sparkPoints.length) return "";
    const pts  = this._sparkPoints.slice(-60);
    const max  = Math.max(...pts, 1);
    const W = 120, H = 40;
    const bw = W / pts.length;
    let rects = "";
    pts.forEach((v, i) => {
      const h = Math.round(v / max * H) || 1;
      const y = H - h;
      const color = v > (max * 0.6) ? "#f04a5a" : "#26de6e";
      rects += `<rect x="${(i * bw).toFixed(1)}" y="${y}" width="${(bw - 1).toFixed(1)}" height="${h}" fill="${color}" opacity=".8"/>`;
    });
    return `<svg width="${W}" height="${H}" style="display:block">${rects}</svg>`;
  }
}

// ---------------------------------------------------------------------------
// Global state
// ---------------------------------------------------------------------------
const state = {};          // ticker -> { alpaca, bookmap, relvol }
const rvDetectors = {};    // ticker -> RelVolDetector instance
let bookmapOk  = false;
let alpacaOk   = false;

function _ensureTicker(t) {
  if (!state[t]) state[t] = { alpaca: null, bookmap: null };
  if (!rvDetectors[t]) rvDetectors[t] = new RelVolDetector(t);
}
WATCHLIST.forEach(_ensureTicker);

// ---------------------------------------------------------------------------
// ET time helpers
// ---------------------------------------------------------------------------
function _etTime() {
  // ET is UTC-4 (EDT) or UTC-5 (EST) " use UTC-4 as trading season default
  const now = new Date();
  const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utcMs - 4 * 3600_000);
}

function _marketMinutesElapsed(etNow) {
  const open = new Date(etNow);
  open.setHours(9, 30, 0, 0);
  if (etNow < open) return 0;
  return (etNow - open) / 60_000;
}

function _todWeight(etNow) {
  const h = etNow.getHours(), m = etNow.getMinutes();
  const cur = h * 60 + m;
  for (const b of TOD_WEIGHTS) {
    const s = b.start[0] * 60 + b.start[1];
    const e = b.end[0]   * 60 + b.end[1];
    if (cur >= s && cur < e) return b.w;
  }
  return 1.0;
}

function _marketStatus() {
  const et  = _etTime();
  const hm  = et.getHours() * 60 + et.getMinutes();
  const dow = et.getDay();
  if (dow === 0 || dow === 6) return "closed";
  if (hm >= 9*60+30  && hm < 16*60) return "open";
  if (hm >= 4*60     && hm < 9*60+30) return "pre";
  if (hm >= 16*60    && hm < 20*60)   return "after";
  return "closed";
}

// ---------------------------------------------------------------------------
// TRIPLE_CONFLUENCE detection
// ---------------------------------------------------------------------------
function detectTripleConfluence(ticker) {
  const s   = state[ticker];
  const rv  = rvDetectors[ticker];
  if (!s || !s.bookmap || !rv) return null;
  const bm  = s.bookmap;

  const rvConf  = rv.signalConf;
  const icebergs = bm.icebergs || [];
  const div     = bm.vwap_divergence;
  const conf    = bm.confluence_alert;

  const bestIceConf = icebergs.length
    ? Math.max(...icebergs.map(i => i.confidence || 0)) : 0;
  const divConf  = div?.confidence || 0;

  if (rvConf >= 0.60 && bestIceConf >= 0.60 && divConf >= 0.60) {
    const combined = Math.min(1.0,
      (rvConf + bestIceConf + divConf) / 3 + 0.20);
    const price = bm.price || s.alpaca?.close || 0;
    const vwap  = bm.vwap  || s.alpaca?.vwap  || 0;
    const hi    = bm.day_high || s.alpaca?.high || 0;
    return {
      signal: "TRIPLE_CONFLUENCE",
      confidence: +combined.toFixed(2),
      components: {
        relvol:  rv.signal,
        iceberg: icebergs.find(i => i.confidence === bestIceConf)?.signal,
        vwap:    div?.signal,
      },
      implication: "HIGH_CONVICTION_FADE",
      suggested_entry:  +price.toFixed(4),
      suggested_target: +vwap.toFixed(4),
      suggested_stop:   +hi.toFixed(4),
    };
  }
  return null;
}

// ---------------------------------------------------------------------------
// Alpaca fetch
// ---------------------------------------------------------------------------
async function fetchAlpaca() {
  const symbols = WATCHLIST.join(",");
  if (!symbols) return;
  try {
    // Snapshot returns dailyBar (full-day OHLCV), latestTrade (price),
    // latestQuote (bid/ask), prevDailyBar (prev close) — all in one call.
    const snapRes = await fetch(
      `${ALPACA_BASE}/v2/stocks/snapshots?symbols=${symbols}&feed=sip`, {
        headers: { "APCA-API-KEY-ID": ALPACA_KEY_ID, "APCA-API-SECRET-KEY": ALPACA_SECRET_KEY },
        signal: AbortSignal.timeout(8000),
      }
    );
    alpacaOk = snapRes.ok;
    const snaps = snapRes.ok ? (await snapRes.json()) : {};

    WATCHLIST.forEach(t => {
      const snap = snaps[t];
      if (!snap) return;

      const db  = snap.dailyBar      || {};  // full day: open, high, low, close, volume, vwap
      const pdb = snap.prevDailyBar  || {};  // previous day close
      const lt  = snap.latestTrade   || {};  // most recent trade price
      const lq  = snap.latestQuote  || {};  // bid/ask

      // Use latestTrade for current price; fall back to dailyBar close
      const close = lt.p ?? db.c ?? null;

      const a = state[t].alpaca || {};
      const prevPrice = a.close ?? null;

      state[t].alpaca = {
        close:      close,
        open:       db.o  ?? null,
        high:       db.h  ?? null,
        low:        db.l  ?? null,
        volume:     db.v  ?? null,
        vwap:       db.vw ?? null,
        trades:     db.n  ?? null,
        bid:        lq.bp ?? a.bid ?? null,
        ask:        lq.ap ?? a.ask ?? null,
        bid_sz:     lq.bs ?? null,
        ask_sz:     lq.as ?? null,
        prev_close: pdb.c ?? a.prev_close ?? null,
        change_pct: db.o ? (close - db.o) / db.o * 100 : null,
        change_abs: db.o ? close - db.o : null,
      };

      // Populate prev close + yesterday stats into extended data
      if (!state[t].extended) state[t].extended = {};
      if (pdb.c) state[t].extended.prev_close   = pdb.c;
      if (pdb.v) state[t].extended.yday_volume   = pdb.v;
      if (pdb.h) state[t].extended.yday_high     = pdb.h;
      if (pdb.l) state[t].extended.yday_low      = pdb.l;
      if (pdb.t) state[t].extended.prev_bar_date = pdb.t.slice(0, 10);

      // After-hours: derive from latestTrade vs dailyBar close
      // latestTrade reflects the most recent trade (may be AH)
      const msCurrent = _marketStatus();
      if ((msCurrent === 'after' || msCurrent === 'closed') && lt.p && db.c && lt.p !== db.c) {
        state[t].extended.ah_price      = lt.p;
        state[t].extended.ah_change_abs = lt.p - db.c;
        state[t].extended.ah_change_pct = (lt.p - db.c) / db.c * 100;
        // ah_updated is set by fetchExtendedData from actual bar timestamp — don't overwrite here
      }

      rvDetectors[t].update(db.v, db.o, close, db.n);

      // Fallback: compute rv stats directly from daily bar when market is closed/pre/after
      const _rv = rvDetectors[t];
      if (_rv.volPace == null && db.v && db.o) {
        const _etNow = _etTime();
        const _elapsed = _marketMinutesElapsed(_etNow) || 390;
        _rv.volPace = Math.round(db.v / _elapsed * 390);
      }
      if (_rv.avgTradeSize == null && db.v && db.n && db.n > 0) {
        _rv.avgTradeSize = Math.round(db.v / db.n);
      }

      // Big move tracker — flag if price moved >3% since last poll
      if (prevPrice && close && prevPrice !== close) {
        const pct = (close - prevPrice) / prevPrice * 100;
        if (Math.abs(pct) > 3) {
          if (!bigMoves[t] || Math.abs(pct) > Math.abs(bigMoves[t].changePct)) {
            bigMoves[t] = {
              priceBefore: prevPrice, priceAfter: close, changePct: pct,
              time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }),
              volume: db.v, timestamp: Date.now(),
            };
          }
        }
      }

      // Record added price on first data arrival for this ticker
      if (close && !addedPrices[t]) _recordAddedPrice(t, close);
    });
  } catch (_) { alpacaOk = false; }
}

async function fetchBookmap() {

// ---------------------------------------------------------------------------
// Format helpers
// ---------------------------------------------------------------------------
const fmt  = (n, d=2)  => n == null ? "-" : (+n).toFixed(d);
const fmtK = (n) => {
  if (n == null) return "-";
  const abs = Math.abs(n);
  if (abs >= 1e6) return (n/1e6).toFixed(1)+"M";
  if (abs >= 1e3) return Math.round(n/1e3)+"K";
  return Math.round(n).toString();
};
const fmtSign = (n, d=2) => n == null ? "-" : (n>=0?"+":"")+fmt(n,d);
const ago = (iso) => {
  if (!iso) return "";
  const s = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
  return s < 5 ? "now" : s < 60 ? s+"s ago" : Math.floor(s/60)+"m ago";
};
const cvdArrow = (s) => s==="rising" ? "^" : s==="falling" ? "v" : "->";

// ---------------------------------------------------------------------------
// Build alert chip HTML
// ---------------------------------------------------------------------------
function buildAlertChips() {
  const chips = [];
  WATCHLIST.forEach(t => {
    const s  = state[t];
    const bm = s?.bookmap;
    const rv = rvDetectors[t];
    if (!s) return;

    const tc = detectTripleConfluence(t);
    if (tc) { chips.push(`<span class="alert-chip chip-triple"> ${t}: TRIPLE CONFLUENCE</span>`); return; }

    if (bm?.confluence_alert)
      chips.push(`<span class="alert-chip chip-conf"> ${t}: ${bm.confluence_alert.signal}</span>`);
    if (bm?.vwap_divergence?.signal?.includes("EXHAUSTION"))
      chips.push(`<span class="alert-chip chip-exhaust"> ${t}: ${bm.vwap_divergence.signal}</span>`);
    if ((bm?.icebergs||[]).some(i => i.signal === "ICEBERG_CONFIRMED"))
      chips.push(`<span class="alert-chip chip-ice"> ${t}: ICEBERG CONFIRMED</span>`);
    if (bm?.vwap_divergence && !bm.vwap_divergence.signal?.includes("EXHAUSTION"))
      chips.push(`<span class="alert-chip chip-bear">" ${t}: ${bm.vwap_divergence.signal}</span>`);
    if (rv.signal === "VOLUME_EXPLOSION" || rv.signal === "VOLUME_SPIKE")
      chips.push(`<span class="alert-chip chip-vol">" ${t}: ${rv.signal}</span>`);
  });
  const bar = document.getElementById("alerts-bar");
  if (chips.length) {
    bar.innerHTML = chips.join("");
    bar.classList.add("active");
  } else {
    bar.innerHTML = "";
    bar.classList.remove("active");
  }
}

// ---------------------------------------------------------------------------
// Silent Float / SI% / DTC background fetch (cached 24h in localStorage)
// ---------------------------------------------------------------------------
const FLOAT_CACHE_MS = 24 * 60 * 60 * 1000;

function _loadFloatCache(ticker) {
  try {
    const raw = localStorage.getItem('float_si_' + ticker);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (Date.now() - obj.ts > FLOAT_CACHE_MS) { localStorage.removeItem('float_si_' + ticker); return null; }
    // Reject cache if all values are Unknown/missing (stale bad data)
    if (obj.float === 'Unknown' && obj.si_pct === 'Unknown') { localStorage.removeItem('float_si_' + ticker); return null; }
    return obj;
  } catch(_) { return null; }
}

function _saveFloatCache(ticker, data) {
  try { localStorage.setItem('float_si_' + ticker, JSON.stringify({ ...data, ts: Date.now() })); } catch(_) {}
}

function _applyFloatData(ticker, data) {
  if (!state[ticker]) return;
  if (!state[ticker].extended) state[ticker].extended = {};
  if (data.float)  state[ticker].extended.cat_float = data.float;
  if (data.si_pct) state[ticker].extended.cat_si    = data.si_pct;
  if (data.dtc)    state[ticker].extended.cat_dtc   = data.dtc;
  // Refresh the metrics ribbon (Row 2) in-place
  const card = document.getElementById('card-' + ticker);
  if (card) {
    const ribbon = card.querySelector('.card-metrics');
    if (ribbon) {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderCard(ticker);
      const newRibbon = tmp.querySelector('.card-metrics');
      if (newRibbon) ribbon.replaceWith(newRibbon);
    }
  }
}

let _floatFetchBusy = false; // one at a time to avoid 429s
const _floatFetchQueue = [];

async function _drainFloatQueue() {
  if (_floatFetchBusy || !_floatFetchQueue.length) return;
  _floatFetchBusy = true;
  const ticker = _floatFetchQueue.shift();
  await _doFetchFloatSI(ticker);
  _floatFetchBusy = false;
  if (_floatFetchQueue.length) setTimeout(_drainFloatQueue, 3000); // 3s between calls
}

// ---------------------------------------------------------------------------
// Yahoo Finance float/SI/DTC fetch
// ---------------------------------------------------------------------------
const floatLoading = new Set(); // tickers currently being fetched

function formatShares(n) {
  if (!n) return 'Unknown';
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K';
  return n.toString();
}

async function fetchFloatFromYahoo(symbol) {
  try {
    const res = await fetch(`${BOOKMAP_URL}/float/${symbol}`, {
      signal: AbortSignal.timeout(10000),
    });
    if (!res.ok) return null;
    const data = await res.json();
    console.log('Float data for', symbol, data);
    if (data.float === 'Unknown' && data.si_pct === 'Unknown') return null;
    return { float: data.float, si_pct: data.si_pct, dtc: data.dtc };
  } catch(e) {
    console.log('Float fetch failed for', symbol, e.message);
    return null;
  }
}

function fetchFloatSI(ticker, delay = 0) {
  // Already have data from catalyst? Use it immediately.
  const cs = catalystState[ticker];
  if (cs?.data?.float) {
    _applyFloatData(ticker, { float: cs.data.float, si_pct: cs.data.short_interest, dtc: cs.data.dtc });
    return;
  }
  // Check localStorage cache (24h) — instant, no API call
  const cached = _loadFloatCache(ticker);
  if (cached) { console.log('Float cache hit for', ticker); _applyFloatData(ticker, cached); return; }
  // Fetch from Yahoo Finance with optional delay (for staggering)
  if (floatLoading.has(ticker)) return;
  floatLoading.add(ticker);
  _refreshMetricsUI(ticker); // show "..."
  setTimeout(async () => {
    try {
      const result = await fetchFloatFromYahoo(ticker);
      if (result) {
        _saveFloatCache(ticker, result);
        _applyFloatData(ticker, result);
      }
    } catch(_) {}
    floatLoading.delete(ticker);
    _refreshMetricsUI(ticker);
  }, delay);
}

function _refreshMetricsUI(ticker) {
  const card = document.getElementById('card-' + ticker);
  if (!card) return;
  const ribbon = card.querySelector('.card-metrics');
  if (!ribbon) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderCard(ticker);
  const newRibbon = tmp.querySelector('.card-metrics');
  if (newRibbon) ribbon.replaceWith(newRibbon);
}

function toggleCardBody(ticker) {
  cardOpen[ticker] = !cardOpen[ticker];
  if (cardOpen[ticker]) {
    const idx = WATCHLIST.indexOf(ticker);
    setTimeout(() => _startNewsRefresh(ticker), idx * 1000); // stagger news fetches
    fetchFloatSI(ticker, idx * 800); // stagger float fetches
  }
  // Re-render just this card in-place
  const old = document.getElementById('card-' + ticker);
  if (!old) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderCard(ticker);
  old.parentNode.replaceChild(tmp.firstElementChild, old);
}

  const ahCls    = (ex.ah_change_pct??0)>=0 ? "cs-up" : "cs-down";
  const ahChange = ex.ah_change_abs!=null ? fmtSign(ex.ah_change_abs)+" ("+fmtSign(ex.ah_change_pct)+"%)" : "-";
  const pmRows   = ex.pm_open!=null
    ? `<div class="session-row"><span class="sl">PM Open</span><span class="sv">$${fmt(ex.pm_open)}</span></div>
       <div class="session-row"><span class="sl">PM High</span><span class="sv" style="font-weight:700">${_pmHiTime}$${fmt(ex.pm_high)}</span></div>
       <div class="session-row"><span class="sl">PM Low</span><span class="sv">$${fmt(ex.pm_low)}</span></div>
       <div class="session-row"><span class="sl">PM Vol</span><span class="sv">${fmtK(ex.pm_volume)}</span></div>`
    : `<div class="session-row"><span class="sl">Prev Close</span><span class="sv">${prevClose!=null?"$"+fmt(prevClose):"-"}</span></div>
       <div class="session-row"><span class="sl">Day Open</span><span class="sv">${dayOpen!=null?"$"+fmt(dayOpen):"-"}</span></div>
       <div class="session-row"><span class="sl" style="color:var(--dim2);font-style:italic">PM data unavailable</span><span></span></div>`;
  const ahRows = ahShow
    ? `<div class="session-row"><span class="sl">AH Price</span><span class="sv ${ahCls}">$${fmt(ex.ah_price)}</span></div>
       <div class="session-row"><span class="sl">AH Change</span><span class="sv ${ahCls}">${ahChange}</span></div>
       <div class="session-row"><span class="sl">${_isStaleAH ? "AH Vol (final)" : "AH Vol"}</span><span class="sv">${fmtK(ex.ah_volume)}</span></div>
       ${_ahAsOf ? `<div class="ah-stale">${_ahAsOf}</div>` : ""}`
    : `<div class="session-row"><span class="sv-na">- before 4PM -</span></div>`;

  const colB = `
    <div class="session-col sc-premarket">
      <div class="session-hdr">Pre-Market <span class="session-badge">&#128197; ${_fmtDate(_tradingDateStr())}</span></div>
      <div class="session-row"><span class="sl">Gap</span><span class="sv ${gapCls}">${gapPct!=null?fmtSign(gapPct)+"%":"-"}</span></div>
      ${pmRows}
    </div>`;

  // Col C — After Hours
  const colC = `
    <div class="session-col sc-afterhours">
      <div class="session-hdr">After Hours <span class="session-badge">&#128197; ${_fmtDate(_tradingDateStr())}</span></div>
      ${ahRows}
    </div>`;

  // Col D — Yesterday
  const yHiT = ex.yday_high_time ? `<span class="sv-t">(${ex.yday_high_time})</span> ` : "";
  const yLoT = ex.yday_low_time  ? `<span class="sv-t">(${ex.yday_low_time})</span> `  : "";
  const colD = `
    <div class="session-col sc-yesterday">
      <div class="session-hdr">Yesterday <span class="session-badge">&#128197; ${_fmtDate(ex.prev_bar_date||"")}</span></div>
      <div class="session-row"><span class="sl">Prev Close</span><span class="sv">${ex.prev_close!=null?"$"+fmt(ex.prev_close):"-"}</span></div>
      <div class="session-row"><span class="sl">High</span><span class="sv">${yHiT}${ex.yday_high!=null?"$"+fmt(ex.yday_high):"-"}</span></div>
      <div class="session-row"><span class="sl">Low</span><span class="sv">${yLoT}${ex.yday_low!=null?"$"+fmt(ex.yday_low):"-"}</span></div>
      <div class="session-row"><span class="sl">Vol</span><span class="sv">${fmtK(ex.yday_volume)}</span></div>
    </div>`;

  const row3 = `<div class="card-sessions">${colA}${colB}${colC}${colD}</div>`;

  return `
    <div class="ticker-card ${cardClass}" id="card-${ticker}">
      ${headerBar}
      <div class="card-body-wrap">
        ${row1}
        ${row2}
        ${row3}
        <div id="cat-${ticker}" class="catalyst-panel">${_buildCatalystPanelHTML(ticker)}</div>
        ${_buildNewsPanel(ticker)}
      </div>
    </div>`;
}

// Copy snapshot for Claude
// ---------------------------------------------------------------------------
function copySnapshot(ticker) {
  const s  = state[ticker];
  const a  = s?.alpaca;
  const bm = s?.bookmap;
  const rv = rvDetectors[ticker];
  const tc = detectTripleConfluence(ticker);
  const t  = new Date().toLocaleTimeString();

  const lines = [
    `FLOWDESK SNAPSHOT @ ${t}`,
    "=============================",
    `TICKER: ${ticker}`,
    a ? `Price: $${fmt(a.close)} (${fmtSign(a.change_pct)}% / ${fmtSign(a.change_abs,2)})` : "",
    a ? `Bid: $${fmt(a.bid)} x${fmtK(a.bid_sz)} . Ask: $${fmt(a.ask)} x${fmtK(a.ask_sz)} . Spread: ${a.bid&&a.ask?((a.ask-a.bid)/a.ask*100).toFixed(2):"-"}%` : "",
    bm ? `VWAP: $${fmt(bm.vwap)} . Ext: ${fmtSign(bm.price_vwap_ext)}% . CVD: ${fmtK(bm.cvd)} (${cvdArrow(bm.cvd_slope)} -${fmt(bm.cvd_drawdown_pct,0)}% from peak)` : "",
    a  ? `Vol: ${fmtK(a.volume)} . RelVol: ${rv.rvCurrent!=null?rv.rvCurrent.toFixed(1)+"-":"-"} (adj) . Pace: ${rv.volPace!=null?fmtK(rv.volPace)+" EOD":"-"}` : "",
    rv.avgTradeSize ? `Avg Trade: ${rv.avgTradeSize} shares . Acceleration: ${fmtSign(rv.acceleration,0)}%` : "",
    bm?.largest_ask_wall?.cob ? `Largest Ask Wall: $${fmt(bm.largest_ask_wall.price,4)} / ${fmtK(bm.largest_ask_wall.cob)} COB` : "",
    bm?.largest_bid_wall?.cob ? `Largest Bid Wall: $${fmt(bm.largest_bid_wall.price,4)} / ${fmtK(bm.largest_bid_wall.cob)} COB` : "",
    ...(bm?.icebergs||[]).filter(i=>i.confidence>=0.60).map(i =>
      ` ICEBERG ${i.side.toUpperCase()} @ $${fmt(i.price,4)} . confidence ${(i.confidence*100).toFixed(0)}% . ${i.implication}`),
    bm?.vwap_divergence ? `${cvdArrow(bm.cvd_slope)} ${bm.vwap_divergence.signal} . confidence ${(bm.vwap_divergence.confidence*100).toFixed(0)}% . Target $${fmt(bm.vwap_divergence.suggested_target)}` : "",
    rv.signal ? `${rv.signal === "VOLUME_EXPLOSION" ? "[BOOM]" : rv.signal.includes("SPIKE") ? "[FIRE][FIRE]" : "[FIRE]"} ${rv.signal} . ${rv.rvCurrent?.toFixed(1)}- adj RelVol` : "",
    tc ? [
      `[TARGET][TARGET] TRIPLE CONFLUENCE - ${tc.implication}`,
      `Entry: $${fmt(tc.suggested_entry)} . Target: $${fmt(tc.suggested_target)} . Stop: $${fmt(tc.suggested_stop)}`,
    ].join("\n") : (bm?.confluence_alert ? ` ${bm.confluence_alert.message}` : ""),
    "=============================",
  ].filter(Boolean).join("\n");

  navigator.clipboard.writeText(lines).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = lines;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  });
}

function applyTickerInput() {
  const raw = document.getElementById("ticker-input").value.trim().toUpperCase();
  if (!raw) return;
  const tickers = raw.split(/[\s,]+/).filter(Boolean);
  let added = false;
  tickers.forEach(t => {
    if (!WATCHLIST.includes(t)) {
      WATCHLIST.push(t);
      _ensureTicker(t);
      rvDetectors[t].fetchAvgVol();
      added = true;
    }
  });
  renderAll();
  // Keep input synced with full watchlist
  document.getElementById("ticker-input").value = WATCHLIST.join(" ");
  // Immediately fetch data for new tickers instead of waiting for next poll
  if (added) {
    fetchAlpaca().then(renderAll);
    fetchExtendedData();
    tickers.forEach((t, i) => { fetchCompanyName(t); fetchFloatSI(t, i * 800); });
  }
}

function removeTicker(t) {
  WATCHLIST = WATCHLIST.filter(x => x !== t);
  _stopNewsRefresh(t);
  _clearAddedPrice(t);
  document.getElementById("ticker-input").value = WATCHLIST.join(" ");
  renderAll();
}

function clearWatchlist() {
  WATCHLIST = [];
  document.getElementById("ticker-input").value = "";
  renderAll();
}

document.getElementById("ticker-input").addEventListener("keydown", e => {
  if (e.key === "Enter") applyTickerInput();
});

// ---------------------------------------------------------------------------
// NEWS PANEL
// ---------------------------------------------------------------------------
const newsData    = {}; // ticker -> { articles: [], fetchedAt: null }
const newsTimers  = {}; // ticker -> setInterval handle
const NEWS_REFRESH_MS   = 5 * 60 * 1000; // 5 minutes
const NEWS_BREAKING_MS  = 30 * 60 * 1000; // 30 minutes
const NEWS_RECENT_HRS   = 4 * 60 * 60 * 1000; // 4 hours

function _newsAgo(isoStr) {
  if (!isoStr) return "";
  const diff = Date.now() - new Date(isoStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  return Math.floor(h / 24) + "d ago";
}

function _newsRecentCount(ticker) {
  const articles = newsData[ticker]?.articles || [];
  const cutoff = Date.now() - NEWS_RECENT_HRS;
  return articles.filter(a => new Date(a.created_at).getTime() > cutoff).length;
}

async function fetchTickerNews(ticker) {
  try {
    const r = await fetch(
      `https://data.alpaca.markets/v1beta1/news?symbols=${ticker}&limit=5&sort=desc`,
      {
        headers: {
          'APCA-API-KEY-ID':     ALPACA_KEY_ID,
          'APCA-API-SECRET-KEY': ALPACA_SECRET_KEY,
        },
        signal: AbortSignal.timeout(8000),
      }
    );
    if (!r.ok) return;
    const data = await r.json();
    newsData[ticker] = { articles: data.news || [], fetchedAt: Date.now() };
  } catch(_) { /* fail silently */ }
  // Update just the news panel + header badge in-place (no full re-render)
  _refreshNewsPanelUI(ticker);
}

function _startNewsRefresh(ticker) {
  if (newsTimers[ticker]) return; // already running
  fetchTickerNews(ticker); // immediate first fetch
  newsTimers[ticker] = setInterval(() => fetchTickerNews(ticker), NEWS_REFRESH_MS);
}

function _stopNewsRefresh(ticker) {
  if (newsTimers[ticker]) { clearInterval(newsTimers[ticker]); delete newsTimers[ticker]; }
}

function _refreshNewsPanelUI(ticker) {
  const panel = document.getElementById('news-panel-' + ticker);
  if (panel) panel.innerHTML = _buildNewsPanelInner(ticker);
  const badge = document.getElementById('news-hdr-badge-' + ticker);
  if (badge) {
    const count = _newsRecentCount(ticker);
    const hasRecent = (newsData[ticker]?.articles || []).some(
      a => Date.now() - new Date(a.created_at).getTime() < NEWS_BREAKING_MS
    );
    if (count > 0) {
      badge.textContent = count + ' news';
      badge.className = 'hbar-news-badge' + (hasRecent ? ' recent' : '');
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  }
}

function _buildNewsPanelInner(ticker) {
  const nd = newsData[ticker];
  if (!nd) {
    return `<div class="news-loading"><div class="ca-spinner"></div>Loading news...</div>`;
  }
  const articles = nd.articles || [];
  if (!articles.length) {
    return `<div class="news-empty">No recent news found for ${ticker}</div>`;
  }
  return articles.map(a => {
    const pubMs   = new Date(a.created_at).getTime();
    const isBreaking = (Date.now() - pubMs) < NEWS_BREAKING_MS;
    const sentiment  = (a.symbols?.find(s => s === ticker) ? null : null); // field varies
    // Alpaca news sentiment may be in a.insights array
    const insight = (a.insights || []).find(i => i.symbol === ticker);
    const sent = insight?.sentiment || a.sentiment || null;
    const sentHtml = sent ? `<span class="news-sentiment ${sent === 'positive' || sent === 'bullish' ? 'ns-bullish' : sent === 'negative' || sent === 'bearish' ? 'ns-bearish' : 'ns-neutral'}">${sent === 'positive' ? 'bullish' : sent === 'negative' ? 'bearish' : sent}</span>` : '';
    const breakHtml = isBreaking ? `<span class="news-breaking">BREAKING</span>` : '';
    const url = a.url || '#';
    return `<div class="news-item">
      <div class="news-item-top">
        <a class="news-headline" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${a.headline || 'No headline'}</a>
        ${breakHtml}
      </div>
      <div class="news-meta">
        <span class="news-source">${a.source || ''}</span>
        <span class="news-time">${_newsAgo(a.created_at)}</span>
        ${sentHtml}
      </div>
    </div>`;
  }).join('');
}

function _buildNewsPanel(ticker) {
  const visible = !!newsOpen[ticker];
  return `
    <div id="news-panel-wrap-${ticker}" style="display:${visible?'block':'none'}">
      <div class="news-panel">
        <div class="news-panel-header">
          <span>&#128240; News</span>
          ${newsData[ticker]?.articles?.length
            ? `<span class="news-count-badge${(newsData[ticker].articles.some(a => Date.now()-new Date(a.created_at).getTime()<NEWS_BREAKING_MS))?' has-recent':''}">${newsData[ticker].articles.length}</span>`
            : ''}
          <span style="margin-left:auto;font-size:10px;color:var(--dim2);font-weight:400">auto-refresh 5m</span>
        </div>
        <div id="news-panel-${ticker}">${_buildNewsPanelInner(ticker)}</div>
      </div>
    </div>`;
}

// ---------------------------------------------------------------------------
// PRICE TIMELINE — extended data, big moves, added prices
// ---------------------------------------------------------------------------
const bigMoves    = {};  // ticker -> { priceBefore, priceAfter, changePct, time, volume, timestamp }
const addedPrices = {};  // ticker -> { price, time }

function _initAddedPrices() {
  WATCHLIST.forEach(t => {
    try {
      const s = localStorage.getItem('added_price_' + t);
      if (s) addedPrices[t] = JSON.parse(s);
    } catch(_) {}
  });
}

function _recordAddedPrice(ticker, price) {
  if (addedPrices[ticker]) return; // already set
  addedPrices[ticker] = {
    price: +price,
    time:  new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }),
  };
  try { localStorage.setItem('added_price_' + ticker, JSON.stringify(addedPrices[ticker])); } catch(_) {}
}

function _clearAddedPrice(ticker) {
  delete addedPrices[ticker];
  try { localStorage.removeItem('added_price_' + ticker); } catch(_) {}
}

function _etDateStr() {
  return _etTime().toISOString().slice(0, 10);
}

function _fmtDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr + 'T12:00:00Z');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// Returns the most recent trading day date string (YYYY-MM-DD ET)
// Skips weekends; if it's before 4am ET treat as previous day
function _tradingDateStr() {
  const et = _etTime();
  // If before 4am ET, use previous calendar day
  if (et.getHours() < 4) et.setDate(et.getDate() - 1);
  // Skip back over weekends
  while (et.getDay() === 0 || et.getDay() === 6) et.setDate(et.getDate() - 1);
  return et.toISOString().slice(0, 10);
}

async function fetchExtendedData() {
  const symbols = WATCHLIST.join(',');
  if (!symbols) return;
  const today = _tradingDateStr();
  const hdrs  = { 'APCA-API-KEY-ID': ALPACA_KEY_ID, 'APCA-API-SECRET-KEY': ALPACA_SECRET_KEY };
  const sig   = AbortSignal.timeout(10000);

  // Get prev_bar_date from any ticker that has it (for yday 1-min fetch)
  const ydayDate = WATCHLIST.map(t => state[t]?.extended?.prev_bar_date).find(Boolean) || null;

  // Helper: format ISO time to HH:MM ET (UTC-4 EDT)
  function _toETTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const et = new Date(d.getTime() - 4 * 3600000);
    return et.toISOString().slice(11, 16);
  }

  try {
    const fetches = [
      fetch(`${ALPACA_BASE}/v2/stocks/bars?symbols=${symbols}&timeframe=5Min&start=${today}T08:00:00Z&end=${today}T13:30:00Z&feed=sip&limit=500`, { headers: hdrs, signal: sig }),
      fetch(`${ALPACA_BASE}/v2/stocks/bars?symbols=${symbols}&timeframe=5Min&start=${today}T20:00:00Z&feed=sip&limit=100`, { headers: hdrs, signal: sig }),
      fetch(`${ALPACA_BASE}/v2/stocks/bars?symbols=${symbols}&timeframe=1Min&start=${today}T13:30:00Z&end=${today}T20:00:00Z&feed=sip&limit=1000`, { headers: hdrs, signal: sig }),
    ];
    if (ydayDate) fetches.push(
      fetch(`${ALPACA_BASE}/v2/stocks/bars?symbols=${symbols}&timeframe=1Min&start=${ydayDate}T13:30:00Z&end=${ydayDate}T20:00:00Z&feed=sip&limit=1000`, { headers: hdrs, signal: sig })
    );

    const results = await Promise.all(fetches);
    const pmBars    = results[0].ok ? (await results[0].json()).bars || {} : {};
    const ahBars    = results[1].ok ? (await results[1].json()).bars || {} : {};
    const todayBars = results[2].ok ? (await results[2].json()).bars || {} : {};
    const ydayBars  = (ydayDate && results[3]?.ok) ? (await results[3].json()).bars || {} : {};

    WATCHLIST.forEach(t => {
      if (!state[t]) return;
      if (!state[t].extended) state[t].extended = {};
      const ex = state[t].extended;

      // Premarket bars
      const pm = pmBars[t] || [];
      if (pm.length) {
        ex.pm_open   = pm[0].o;
        ex.pm_high   = Math.max(...pm.map(b => b.h));
        ex.pm_low    = Math.min(...pm.map(b => b.l));
        ex.pm_volume = pm.reduce((s, b) => s + b.v, 0);
        ex.pm_last   = pm[pm.length - 1].c;
        // PM high time
        const pmHiBar = pm.reduce((best, b) => b.h > best.h ? b : best, pm[0]);
        ex.pm_high_time = _toETTime(pmHiBar.t);
      }

      // After-hours bars
      const ah = ahBars[t] || [];
      if (ah.length) {
        ex.ah_price = ah[ah.length - 1].c;
        ex.ah_volume = ah.reduce((s, b) => s + b.v, 0);
        ex.ah_updated = _toETTime(ah[ah.length - 1].t);
        const dayClose = state[t].alpaca?.close;
        if (dayClose) {
          ex.ah_change_abs = ex.ah_price - dayClose;
          ex.ah_change_pct = (ex.ah_price - dayClose) / dayClose * 100;
        }
      }

      // Today intraday 1-min bars → High/Low times
      const td = todayBars[t] || [];
      if (td.length) {
        const hiBar = td.reduce((best, b) => b.h > best.h ? b : best, td[0]);
        const loBar = td.reduce((best, b) => b.l < best.l ? b : best, td[0]);
        ex.today_high_time = _toETTime(hiBar.t);
        ex.today_low_time  = _toETTime(loBar.t);
      }

      // Yesterday 1-min bars → Yday High/Low times
      const yd = ydayBars[t] || [];
      if (yd.length) {
        const yhBar = yd.reduce((best, b) => b.h > best.h ? b : best, yd[0]);
        const ylBar = yd.reduce((best, b) => b.l < best.l ? b : best, yd[0]);
        ex.yday_high_time = _toETTime(yhBar.t);
        ex.yday_low_time  = _toETTime(ylBar.t);
        if (!ex.yday_high) ex.yday_high = Math.max(...yd.map(b => b.h));
        if (!ex.yday_low)  ex.yday_low  = Math.min(...yd.map(b => b.l));
        if (!ex.yday_volume) ex.yday_volume = yd.reduce((s, b) => s + b.v, 0);
      }
    });
  } catch (_) {}

  renderAll();
}

function _buildPriceTimeline(ticker) {
  const a  = state[ticker]?.alpaca;
  const ex = state[ticker]?.extended || {};
  const bm = bigMoves[ticker];
  const ap = addedPrices[ticker];
  if (!a) return '';

  const price    = a.close;
  const prevClose = ex.prev_close ?? null;
  const gapPct   = (prevClose && a.open) ? (a.open - prevClose) / prevClose * 100 : null;
  const gapCls   = gapPct == null ? '' : Math.abs(gapPct) >= 20 && gapPct > 0 ? 'pt-danger' : gapPct > 0 ? 'pt-up' : 'pt-down';

  const addedCls = (ap && price) ? (price < ap.price ? 'pt-green' : 'pt-red') : '';
  const addedPctStr = (ap && price) ? ` <span class="${addedCls}" style="font-size:11px">(${fmtSign((price - ap.price) / ap.price * 100)}%)</span>` : '';

  // Big move time ago
  let bmAgo = '-';
  if (bm) {
    const s = Math.floor((Date.now() - bm.timestamp) / 1000);
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
    bmAgo = h > 0 ? `${h}h ${m}m ago` : `${m}m ago`;
  }

  const ms = _marketStatus();
  const showAH = (ms === 'after' || ms === 'closed') && ex.ah_price != null;

  return `
    <div class="price-timeline">
      <div class="pt-title">&#128202; Price Timeline</div>

      <div class="pt-row">
        <span class="pt-label">Prev Close</span>
        <span class="pt-val">${prevClose != null ? '$' + fmt(prevClose) : '-'}</span>
        <span class="pt-sep">|</span>
        <span class="pt-label">Gap</span>
        <span class="pt-val ${gapCls}">${gapPct != null ? fmtSign(gapPct) + '%' : '-'}</span>
        <span class="pt-sep">|</span>
        <span class="pt-label">Added</span>
        <span class="pt-val ${addedCls}">${ap ? '$' + fmt(ap.price) : '-'}</span>${addedPctStr}
      </div>

      ${ex.pm_open != null ? `
      <div class="pt-row">
        <span class="pt-label">Pre-Market</span>
        <span class="pt-val">$${fmt(ex.pm_open)} -&gt; $${fmt(ex.pm_last)}</span>
        <span class="pt-sep">|</span>
        <span class="pt-label">High</span>
        <span class="pt-val pt-pm-high">$${fmt(ex.pm_high)}</span>
        <span class="pt-sep">|</span>
        <span class="pt-label">Vol</span>
        <span class="pt-val">${fmtK(ex.pm_volume)}</span>
      </div>` : ''}

      <div class="pt-row">
        <span class="pt-label">Day Open</span>
        <span class="pt-val">${a.open != null ? '$' + fmt(a.open) : '-'}</span>
        <span class="pt-sep">|</span>
        <span class="pt-label">High</span>
        <span class="pt-val">${a.high != null ? '$' + fmt(a.high) : '-'}</span>
        <span class="pt-sep">|</span>
        <span class="pt-label">Low</span>
        <span class="pt-val">${a.low != null ? '$' + fmt(a.low) : '-'}</span>
      </div>

      <div class="pt-row pt-row-bm">
        <span class="pt-label">Big Move</span>
        ${bm ? `
          <span class="pt-val" style="color:${bm.changePct > 0 ? 'var(--red)' : 'var(--green)'}">
            $${fmt(bm.priceBefore)} -&gt; $${fmt(bm.priceAfter)}
            (${fmtSign(bm.changePct)}%)
          </span>
          <span class="pt-sep">|</span>
          <span class="pt-label">at ${bm.time}</span>

const CATALYST_SYSTEM_PROMPT = `You are an expert intraday short-side fade trader. Analyze the given ticker as a short candidate. Search the web for the latest catalyst, float, and short interest data. Return ONLY valid JSON — no markdown, no backticks, nothing outside the JSON object.

CATEGORY DEFINITIONS:
RED   = government_contract, fda_approval, major_partnership, buyout_merger, short_squeeze — AVOID shorting
YELLOW = small_contract, phase2_trial, loi_mou, analyst_upgrade, earnings_beat — trade carefully
GREEN  = evaluation_review, pr_only, sympathy_play, no_catalyst, dilution_risk, noncompliance — favorable short setup
BLUE   = insider_activity, institutional_13f, sec_investigation, reverse_split, management_change — context only

Return exactly this JSON structure:
{
  "category": "RED|YELLOW|GREEN|BLUE",
  "catalyst_type": "government_contract|fda_approval|major_partnership|buyout_merger|short_squeeze|small_contract|phase2_trial|loi_mou|analyst_upgrade|earnings_beat|evaluation_review|pr_only|sympathy_play|no_catalyst|dilution_risk|noncompliance|insider_activity|institutional_13f|sec_investigation|reverse_split|management_change",
  "catalyst_name": "Human-readable name e.g. Defense Evaluation (NOT a contract)",
  "is_real_catalyst": true,
  "catalyst_description": "One precise sentence describing what the catalyst actually is",
  "short_risk_level": "EXTREME|HIGH|MEDIUM|LOW",
  "short_risk_reason": "Specific reason this is risky or safe to short",
  "fade_thesis": "When and why the fade will come — be specific with price levels or timing",
  "best_entry_condition": "Exact conditions to wait for before shorting",
  "avoid_until": "Specific condition or timeframe to avoid shorting until",
  "price_target": "$X.XX",
  "verdict": "AVOID|CAUTION|FAVORABLE|CONTEXT",
  "short_score": 78,
  "squeeze_risk": 45,
  "float": "8.7M",
  "short_interest": "27%",
  "dtc": "1.2",
  "rel_vol": "195x",
  "move_pct": "+178%",
  "key_risks": ["risk1", "risk2", "risk3"],
  "supporting_factors": ["factor1", "factor2"]
}

short_score 0-100: higher = better short candidate. Consider catalyst weakness, float size, relative volume, and short interest danger.
squeeze_risk 0-100: higher = more dangerous to short. High SI + low float = extreme squeeze risk.
In key_risks and supporting_factors arrays, write each item as a proper human-readable sentence or phrase with spaces — NOT as snake_case or camelCase strings.
Examples: WRONG: 'extreme_volatility', 'no_real_contracts' — RIGHT: 'Extreme intraday volatility', 'No real contracts announced'
Each item should be 3-6 words, title case, no underscores.

Always search the web for current data. Keep all strings under 120 characters. Return only valid JSON.`;

const catalystState  = {}; // ticker -> { open, status, data, priceData, error }
const _pendingCatKey = {}; // ticker -> key string typed but not yet saved

function getCatalystState(ticker) {
  if (!catalystState[ticker]) {
    catalystState[ticker] = { open: false, status: 'idle', data: null, priceData: null, error: null };
  }
  return catalystState[ticker];
}

function getCatalystApiKey() {
  return localStorage.getItem('anthropic_api_key') || '';
}

function _populateFloatFromCatalyst(ticker, data) {
  if (!data || !state[ticker]) return;
  // Only use catalyst float values if they're real — don't overwrite good Yahoo data with "Unknown"
  const _valid = v => v && v !== 'Unknown' && v !== '-';
  const existing = _loadFloatCache(ticker);
  const floatVal = _valid(data.float)          ? data.float          : (existing?.float  || null);
  const siVal    = _valid(data.short_interest) ? data.short_interest : (existing?.si_pct || null);
  const dtcVal   = _valid(data.dtc)            ? data.dtc            : (existing?.dtc    || null);
  if (!floatVal && !siVal) return; // nothing useful to save
  if (!state[ticker].extended) state[ticker].extended = {};
  if (floatVal) state[ticker].extended.cat_float = floatVal;
  if (siVal)    state[ticker].extended.cat_si    = siVal;
  if (dtcVal)   state[ticker].extended.cat_dtc   = dtcVal;
  _saveFloatCache(ticker, { float: floatVal, si_pct: siVal, dtc: dtcVal });
  _applyFloatData(ticker, { float: floatVal, si_pct: siVal, dtc: dtcVal });
}

async function toggleCatalyst(ticker) {
  const cs = getCatalystState(ticker);
  if (cs.open) {
    cs.open = false;
    _refreshCatalystUI(ticker);
    return;
  }
  cs.open = true;
  if (!getCatalystApiKey()) {
    _refreshCatalystUI(ticker);
    return;
  }
  if (cs.status === 'idle') {
    // Check today's cache first
    const dayCache = _loadCatalystCache(ticker);
    if (dayCache) {
      cs.data = dayCache; cs.status = 'done'; cs.fromCache = true;
      _populateFloatFromCatalyst(ticker, dayCache);
    } else {
      cs.status = 'loading'; cs.fromCache = false;
      _refreshCatalystUI(ticker);
      try {
        // Fetch fresh Yahoo float data to inject into Claude prompt
    const yahooFloat = await fetchFloatFromYahoo(ticker);
    if (yahooFloat) {
      _saveFloatCache(ticker, yahooFloat);
      _applyFloatData(ticker, yahooFloat);
    }
    const [data, priceData] = await Promise.all([
          _runCatalystAPI(ticker, yahooFloat),
          _fetchCatalystSnapshot(ticker)
        ]);
        cs.data = data; cs.priceData = priceData; cs.status = 'done';
        _saveCatalystCache(ticker, data);
        _populateFloatFromCatalyst(ticker, data);
      } catch(e) {
        cs.error = e.message; cs.status = 'error';
      }
    }
  }
  _refreshCatalystUI(ticker);
}

function retryCatalyst(ticker) {
  const cs = getCatalystState(ticker);
  cs.status = 'idle'; cs.error = null;
  toggleCatalyst(ticker);
}

function saveCatalystKey(ticker) {
  const input = document.getElementById('ca-key-' + ticker);
  if (!input) return;
  const key = (input.value || _pendingCatKey[ticker] || '').trim();
  if (!key.startsWith('sk-')) { alert('Invalid key — should start with sk-'); return; }
  localStorage.setItem('anthropic_api_key', key);
  delete _pendingCatKey[ticker];
  retryCatalyst(ticker);
}

function _refreshCatalystUI(ticker) {
  const panel = document.getElementById('cat-' + ticker);
  if (panel) panel.innerHTML = _buildCatalystPanelHTML(ticker);
  const btn = document.getElementById('cat-btn-' + ticker);
  if (btn) btn.classList.toggle('active', getCatalystState(ticker).open);
}

function _buildCatalystPanelHTML(ticker) {
  const cs = getCatalystState(ticker);
  if (!cs.open) return '';

  if (!getCatalystApiKey()) {
    const pending = (_pendingCatKey[ticker] || '').replace(/"/g, '&quot;');
    return `<div class="ca-key-prompt">
      <span class="ca-key-label">Anthropic API key needed:</span>
      <input id="ca-key-${ticker}" class="ca-key-input" type="password"
        placeholder="sk-ant-api03-..." value="${pending}"
        oninput="_pendingCatKey['${ticker}']=this.value"
        onkeydown="if(event.key==='Enter')saveCatalystKey('${ticker}')" />
      <button class="ca-key-save" onclick="saveCatalystKey('${ticker}')">Save &amp; Run</button>
    </div>`;
  }
  if (cs.status === 'loading') {
    return `<div class="ca-loading">
      <div class="ca-spinner"></div>
      <span>Analyzing <strong>${ticker}</strong> — searching catalyst, float, short interest...</span>
    </div>`;
  }
  if (cs.status === 'error') {
    return `<div class="ca-error">
      Analysis failed: ${cs.error}
      <button class="ca-retry-btn" onclick="retryCatalyst('${ticker}')">Retry</button>
    </div>`;
  }
  if (cs.status === 'done' && cs.data) {
    return _buildCatalystResultHTML(cs.data);
  }
  return '';
}

async function _fetchCatalystSnapshot(ticker) {
  try {
    const r = await fetch(`https://data.alpaca.markets/v2/stocks/${ticker}/snapshot`, {
      headers: { 'APCA-API-KEY-ID': ALPACA_KEY_ID, 'APCA-API-SECRET-KEY': ALPACA_SECRET_KEY },
      signal: AbortSignal.timeout(5000)
    });
    if (!r.ok) return null;
    return await r.json();
  } catch(_) { return null; }
}

// ---------------------------------------------------------------------------
// Claude API call with exponential backoff retry on 429
// ---------------------------------------------------------------------------
async function callClaudeWithRetry(payload, maxRetries = 3) {
  const delays = [5000, 15000, 30000];
  const hdrs = {
    'Content-Type': 'application/json',
    'x-api-key': getCatalystApiKey(),
    'anthropic-version': '2023-06-01',
    'anthropic-dangerous-direct-browser-access': 'true',
  };
  for (let i = 0; i < maxRetries; i++) {
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST', headers: hdrs,
        body: JSON.stringify(payload),
        signal: AbortSignal.timeout(60000),
      });
      if (res.status === 429) {
        const wait = delays[i] || 30000;
        console.warn(`Claude 429 — retry ${i+1}/${maxRetries} in ${wait/1000}s`);
        await new Promise(r => setTimeout(r, wait));
        continue;
      }
      if (!res.ok) throw new Error(`API ${res.status}`);
      return await res.json();
    } catch(e) {
      if (i === maxRetries - 1) throw e;
      await new Promise(r => setTimeout(r, delays[i] || 5000));
    }
  }
  throw new Error('Max retries exceeded');
}

// Catalyst day-cache helpers
// ---------------------------------------------------------------------------
function _catalystCacheKey(ticker) {
  return `catalyst_${ticker}_${_tradingDateStr()}`;
}
function _loadCatalystCache(ticker) {
  try { const r = localStorage.getItem(_catalystCacheKey(ticker)); return r ? JSON.parse(r) : null; } catch(_) { return null; }
}
function _saveCatalystCache(ticker, data) {
  try { localStorage.setItem(_catalystCacheKey(ticker), JSON.stringify(data)); } catch(_) {}
}

async function _runCatalystAPI(ticker, realFloat = null) {
  const floatCtx = realFloat
    ? `\n\nReal market data for ${ticker}: Float: ${realFloat.float}, Short Interest: ${realFloat.si_pct}, DTC: ${realFloat.dtc}\nUse these exact values in your JSON response for float, short_interest, and dtc fields.`
    : '';
  const data = await callClaudeWithRetry({
    model: 'claude-sonnet-4-20250514',
    max_tokens: 4000,
    tools: [{ type: 'web_search_20250305', name: 'web_search' }],
    system: CATALYST_SYSTEM_PROMPT,
    messages: [{ role: 'user', content: `Analyze ticker: ${ticker}.\n1) Search web for latest news and catalyst driving it today\n2) Search web for float size and short interest percentage\nReturn ONLY the JSON object, nothing else.${floatCtx}` }],
  });
  const textBlocks = (data.content || []).filter(b => b.type === 'text');
  if (!textBlocks.length) throw new Error('No text in response');
  const combined = textBlocks.map(b => b.text).join('');
  const clean = combined.replace(/```json|```/g, '').trim();
  const match = clean.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('No JSON in response');
  let jsonStr = match[0];
  try { return JSON.parse(jsonStr); } catch(_) {
    const opens = (jsonStr.match(/\{/g)||[]).length;
    const closes = (jsonStr.match(/\}/g)||[]).length;
    jsonStr += '}'.repeat(Math.max(0, opens - closes));
    return JSON.parse(jsonStr);
  }
}

const companyNames = {}; // ticker -> "Apple Inc."

async function fetchCompanyName(ticker) {
  if (companyNames[ticker]) return;
  // Check localStorage cache
  const cached = localStorage.getItem('company_' + ticker);
  if (cached) { companyNames[ticker] = cached; _refreshCompanyUI(ticker); return; }
  try {
    const r = await fetch(`https://paper-api.alpaca.markets/v2/assets/${ticker}`, {
      headers: { 'APCA-API-KEY-ID': ALPACA_KEY_ID, 'APCA-API-SECRET-KEY': ALPACA_SECRET_KEY },
      signal: AbortSignal.timeout(5000),
    });
    if (!r.ok) return;
    const d = await r.json();
    if (d.name) {
      companyNames[ticker] = d.name;
      localStorage.setItem('company_' + ticker, d.name);
      _refreshCompanyUI(ticker);
    }
  } catch(_) {}
}
